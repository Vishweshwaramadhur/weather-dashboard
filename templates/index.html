<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="text-center my-4">
            <h1 class="display-4"><i class="bi bi-cloud-sun"></i> Weather Dashboard</h1>
            <p class="text-muted">Get current weather and 3-day forecast for any city</p>
        </header>
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <div class="input-group mb-3">
                    <input type="text" id="cityInput" class="form-control form-control-lg"
                           placeholder="Enter city name..."
                           onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary btn-lg" onclick="searchWeather()">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>
                <div class="text-center">
                    <button class="btn btn-outline-light" onclick="getCurrentLocationWeather()">
                        <i class="bi bi-geo-alt-fill"></i> Use Current Location
                    </button>
                </div>
            </div>
        </div>

        <div id="loadingSpinner" class="text-center d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Fetching weather data...</p>
        </div>

        <div class="toast-container position-fixed top-0 end-0 p-3">
            <div id="errorToast" class="toast" role="alert">
                <div class="toast-header bg-danger text-white">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <strong class="me-auto">Error</strong>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body" id="toastMessage">
                </div>
            </div>
        </div>


        <div id="currentWeather" class="card mb-4 d-none">
            <div class="card-body">
                <div class="d-flex justify-content-center align-items-center mb-3">
                    <h3 class="mb-0">
                        <i class="bi bi-geo-alt"></i> <span id="cityName"></span>
                    </h3>
                    <button id="unitToggle" class="btn btn-sm btn-outline-secondary ms-3 d-none" onclick="toggleTemperatureUnit()">
                        °F
                    </button>
                </div>
                <div class="row text-center">
                    <div class="col-md-12 mb-3">
                        <img id="weatherIcon" src="" alt="Weather Icon" class="weather-icon">
                        <h1 class="display-1" id="temperature"></h1>
                        <p class="lead text-capitalize" id="description"></p>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-3 col-6 text-center mb-2">
                        <i class="bi bi-thermometer-half fs-3"></i>
                        <p class="mb-0"><strong>Feels Like</strong></p>
                        <p id="feelsLike"></p>
                    </div>
                    <div class="col-md-3 col-6 text-center mb-2">
                        <i class="bi bi-droplet fs-3"></i>
                        <p class="mb-0"><strong>Humidity</strong></p>
                        <p id="humidity"></p>
                    </div>
                    <div class="col-md-3 col-6 text-center mb-2">
                        <i class="bi bi-wind fs-3"></i>
                        <p class="mb-0"><strong>Wind Speed</strong></p>
                        <p id="windSpeed"></p>
                    </div>
                    <div class="col-md-3 col-6 text-center mb-2">
                        <i class="bi bi-speedometer2 fs-3"></i>
                        <p class="mb-0"><strong>Pressure</strong></p>
                        <p id="pressure"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="mapSection" class="card mb-4 d-none">
            <div class="card-body">
                <h4 class="card-title text-center mb-3">
                    <i class="bi bi-map"></i> Location Map
                </h4>
                <div id="map"></div>
            </div>
        </div>

        <div id="forecastSection" class="d-none">
            <h4 class="text-center mb-3"><i class="bi bi-calendar3"></i> 3-Day Forecast</h4>
            <div class="row" id="forecastCards"></div>
        </div>


        <footer class="text-center mt-5 mb-3">
            <p class="text-muted">Powered by OpenWeatherMap API</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
